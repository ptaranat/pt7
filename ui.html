<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#cacdd0">
<meta name="theme-color" content="#1a1b1e" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<title>PT-7</title>
<style>
  :root {
    --gap: max(2.2vw, 11px);
    --radius: 8px;
    --deck: #cacdd0;
    --face: #d8dbde;
    --ink: #292b2e;
    --led-off: #a5a8ab;
    --orange: #f0531c;
    --green: #3f9668;
    --red: #cf4636;
    --on-color: #fff;
    --sheen: rgba(255,255,255,0.45);
    --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
  body {
    height: 100dvh; /* tracks Safari's toolbar; plain 100% stays at the shorter height */
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    background: var(--deck);
    padding: calc(env(safe-area-inset-top) + var(--gap)) calc(env(safe-area-inset-right) + var(--gap))
             calc(env(safe-area-inset-bottom) + var(--gap)) calc(env(safe-area-inset-left) + var(--gap));
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  .key {
    position: relative;
    display: flex;
    margin: 0;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    color: var(--ink);
    --key-sheen: var(--sheen);
    background: var(--face);
    background-image: linear-gradient(180deg, var(--key-sheen), rgba(255,255,255,0) 220px);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.07), 0 2px 0 2px rgba(0,0,0,0.12);
    touch-action: none;
    cursor: pointer;
    overflow: hidden;
    transition: transform 40ms ease-out, box-shadow 40ms ease-out, filter 70ms linear;
  }
  /* Pressed keys sink into their cutout: the seam stays, the chassis shades the cap. */
  .key.pressed {
    transform: translateY(2px);
    filter: brightness(0.96);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.12),
                inset 0 2px 5px rgba(0,0,0,0.25), inset 0 -1px 0 rgba(255,255,255,0.25);
  }
  /* Saturated caps wash out under the full sheen; give them a lighter one. */
  .key.red, .key.green { --key-sheen: rgba(255,255,255,0.15); color: var(--on-color); }
  .key.red { background-color: var(--red); }
  .key.green { background-color: var(--green); }
  .legend { align-self: flex-end; display: flex; align-items: baseline; gap: 12px; }
  .cap {
    font: 500 clamp(12px,3.2vw,16px)/1 var(--mono);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: inherit;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 6px 0;
  }
  .brand {
    font: 200 clamp(36px,10vw,56px)/1 "Helvetica Neue", -apple-system, sans-serif;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-decoration: none;
  }
  .screen {
    display: flex; align-items: center; justify-content: flex-end;
    min-width: 6ch;
    padding: 10px 13px;
    border-radius: 6px;
    background: #0b0c0d;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.9), 0 1px 0 rgba(255,255,255,0.08);
    font: 500 clamp(15px,4.2vw,21px)/1 var(--mono);
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
  }
  .screen .time { color: #4b4e54; transition: color 90ms linear; }
  .talking .screen .time { color: #fafaf7; text-shadow: 0 0 10px rgba(255,255,255,0.45); }
  .screen .alert {
    display: none; color: var(--red);
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  .offline .screen .time { display: none; }
  @keyframes blink { 50% { opacity: 0.25; } }
  .offline .screen .alert { display: inline; animation: blink 1s steps(1) infinite; }

  /* Square when there is room; full width always, shrinking on short screens. */
  #talk { flex: 0 1 auto; width: 100%; aspect-ratio: 1; }
  #talk .legend {
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  #talk .lamp {
    width: clamp(34px, 9vw, 58px);
    height: clamp(34px, 9vw, 58px);
    border-radius: 50%;
    background-color: var(--led-off);
    background-image: radial-gradient(circle at 33% 28%,
      rgba(255,255,255,0.38), rgba(255,255,255,0.08) 42%, rgba(255,255,255,0) 62%);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.12), inset 0 2px 4px rgba(0,0,0,0.3);
    transition: background-color 90ms linear, box-shadow 130ms ease-out;
  }
  #talk.pressed .lamp {
    background-color: var(--orange);
    box-shadow: 0 0 0 2px rgba(0,0,0,0.12), inset 0 2px 4px rgba(0,0,0,0.15),
                0 0 6px rgba(240,83,28,0.9), 0 0 24px rgba(240,83,28,0.6);
  }
  .cluster { flex: 1 1 0; display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
  .cluster .primary { grid-column: 2; grid-row: 1 / -1; justify-content: flex-end; }

  @media (prefers-color-scheme: dark) {
    :root {
      --deck: #1a1b1e; --face: #202126; --ink: #ececea;
      --led-off: #5c5e64; --orange: #ff5a26; --green: #45ac7c; --red: #e2483c;
      --sheen: rgba(255,255,255,0.08);
    }
    .key {
      box-shadow: 0 0 0 2px rgba(0,0,0,0.5),
                  inset 0 1px 0 rgba(255,255,255,0.07), 0 2px 5px rgba(0,0,0,0.55);
    }
    .key.pressed { box-shadow: 0 0 0 2px rgba(0,0,0,0.5), inset 0 1px 2px rgba(0,0,0,0.5); }
    #talk .lamp { box-shadow: 0 0 0 2px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.45); }
    #talk.pressed .lamp {
      box-shadow: 0 0 0 2px rgba(0,0,0,0.5), inset 0 2px 4px rgba(0,0,0,0.2),
                  0 0 6px rgba(255,90,38,0.9), 0 0 24px rgba(255,90,38,0.55);
    }
  }
</style>
</head>
<body>
<header>
  <a class="brand" href="https://github.com/ptaranat/pt7" target="_blank" rel="noopener">PT&#8211;7</a>
  <span class="screen"><span class="time">0:00.0</span><span class="alert">offline</span></span>
</header>
<button id="talk" class="key">
  <span class="legend"><span class="lamp"></span><span class="cap"></span></span>
</button>
<div class="cluster"></div>
<script>
var KEYS = __KEYS__;

var state = {};
var offline = false;

function setOffline(on) {
  if (on === offline) return;
  offline = on;
  document.body.classList.toggle('offline', on);
}

// body:'' sets Content-Length:0; hs.httpserver 400s a POST without it.
// On failure, keep re-posting the key's desired state until the Mac confirms
// it, so a dropped /up can never leave a key stuck down.
function post(id, down) {
  fetch(id + '/' + (down ? 'down' : 'up'), { method: 'POST', body: '', keepalive: true })
    .then(function (r) { if (!r.ok) throw r; setOffline(false); })
    .catch(function () {
      setOffline(true);
      setTimeout(function () { if (state[id] === down) post(id, down); }, 800);
    });
}

function bind(button, key) {
  state[key.id] = false;
  function set(down) {
    if (state[key.id] === down) return;
    state[key.id] = down;
    button.classList.toggle('pressed', down);
    if (key.role === 'talk') counter(down);
    post(key.id, down);
  }
  button.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    try { button.setPointerCapture(e.pointerId); } catch (err) {}
    set(true);
  });
  button.addEventListener('pointerup', function () { set(false); });
  button.addEventListener('pointercancel', function () { set(false); });
  addEventListener('pagehide', function () { set(false); });
}

var talkKey = KEYS.find(function (k) { return k.role === 'talk'; });
var screenTime = document.querySelector('.screen .time');
var t0, raf;
// The screen keeps showing the last take's length after release.
function counter(on) {
  document.body.classList.toggle('talking', on);
  cancelAnimationFrame(raf);
  if (on) { t0 = performance.now(); tick(); }
}
function tick() {
  var s = (performance.now() - t0) / 1000;
  screenTime.textContent = Math.floor(s / 60) + ':' + (s % 60).toFixed(1).padStart(4, '0');
  raf = requestAnimationFrame(tick);
}

document.querySelector('#talk .cap').textContent = talkKey.label;
bind(document.getElementById('talk'), talkKey);

var cluster = document.querySelector('.cluster');
var rest = KEYS.filter(function (k) { return k.role !== 'talk'; });
cluster.style.gridTemplateRows =
  'repeat(' + rest.filter(function (k) { return k.role !== 'primary'; }).length + ', 1fr)';
rest.forEach(function (k) {
  var b = document.createElement('button');
  b.className = 'key' + (k.color ? ' ' + k.color : '') + (k.role === 'primary' ? ' primary' : '');
  var legend = document.createElement('span');
  legend.className = 'legend';
  var cap = document.createElement('span');
  cap.className = 'cap';
  cap.textContent = k.label;
  legend.appendChild(cap);
  b.appendChild(legend);
  cluster.appendChild(b);
  bind(b, k);
});

setInterval(function () {
  if (offline) {
    fetch('ping').then(function (r) { setOffline(!r.ok); }).catch(function () {});
  }
}, 2000);

if (navigator.wakeLock) {
  var grab = function () { navigator.wakeLock.request('screen').catch(function () {}); };
  grab();
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) grab();
  });
}
</script>
</body>
</html>
